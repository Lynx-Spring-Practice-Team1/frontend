server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── SPA routing ───────────────────────────────────────────────────────────
    # All paths that don't match a real file fall through to index.html so
    # React Router can handle them client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy (REST + WebSocket) ──────────────────────────────────────────
    # Forwards /api/* to the API Gateway. WebSocket upgrade headers are always
    # set so that /api/ws connections work without a separate location block.
    location /api/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (used by /api/ws live price feed)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Keep WebSocket connections alive for as long as the market is open
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Auth proxy ────────────────────────────────────────────────────────────
    location /auth/ {
        proxy_pass         http://api-gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite fingerprints JS/CSS filenames with a content hash, so these can be
    # cached aggressively.
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "same-origin"  always;
    add_header Content-Security-Policy
      "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data:; frame-ancestors 'none';"
      always;
}
